<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'">
    <title>The Brief — Daily News</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Scrolling Ticker -->
    <div class="ticker-bar">
        <div class="ticker-label">
            <span class="live-dot"></span>LIVE
        </div>
        <div class="ticker-track">
            <div class="ticker-scroll" id="ticker-scroll">
                <!-- populated by script.js -->
            </div>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="header-top-row">
            <span id="header-date">—</span>
            <span class="edition-label">Daily Edition</span>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                <svg class="theme-icon theme-icon--sun" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4"/>
                    <line x1="8" y1="1" x2="8" y2="3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    <line x1="8" y1="13" x2="8" y2="15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    <line x1="1" y1="8" x2="3" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    <line x1="13" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    <line x1="2.93" y1="2.93" x2="4.34" y2="4.34" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    <line x1="11.66" y1="11.66" x2="13.07" y2="13.07" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    <line x1="2.93" y1="13.07" x2="4.34" y2="11.66" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    <line x1="11.66" y1="4.34" x2="13.07" y2="2.93" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
                <svg class="theme-icon theme-icon--moon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M13.5 10.5A6 6 0 0 1 5.5 2.5a6 6 0 1 0 8 8z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        <div class="header-masthead">
            <div class="rule-line"></div>
            <h1>THE BRIEF</h1>
            <div class="rule-line"></div>
        </div>
        <p class="tagline">Intelligence · Curated Daily</p>
        <div class="header-red-bar"></div>
    </header>

    <!-- Market Ticker -->
    <div class="market-ticker-bar" id="market-ticker-bar">
        <div class="market-ticker-label">
            <svg class="market-icon" viewBox="0 0 12 10" fill="none" aria-hidden="true">
                <polyline points="1,9 4,4 7,6 11,1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            MARKETS
        </div>
        <div class="market-ticker-track">
            <div class="market-ticker-scroll" id="market-ticker-scroll">
                <!-- populated by script.js -->
            </div>
        </div>
        <button class="market-settings-btn" id="market-settings-btn" aria-label="Customize market symbols" title="Customize symbols">
            <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M8 1v2M8 13v2M1 8h2M13 8h2M2.93 2.93l1.41 1.41M11.66 11.66l1.41 1.41M2.93 13.07l1.41-1.41M11.66 4.34l1.41-1.41" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
        </button>
        <div class="market-picker" id="market-picker" hidden>
            <p class="market-picker-title">Symbols</p>
            <div class="market-picker-list" id="market-picker-list"></div>
        </div>
    </div>

    <!-- Filter Navigation -->
    <nav class="filter-nav" id="filter-nav">
        <div class="filter-inner">
            <span class="filter-eyebrow">Section</span>
            <div class="filter-pills" id="filter-pills">
                <button class="filter-btn active" data-filter="all">All</button>
                <!-- additional category buttons injected by JS -->
            </div>
            <div class="search-wrap">
                <svg class="search-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                    <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input type="search" id="search-input" class="search-input" placeholder="Search headlines…" autocomplete="off" spellcheck="false">
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main>
        <div class="news-grid" id="news"></div>
        <div class="no-results hidden" id="no-results">
            <p class="no-results-icon">◎</p>
            <p class="no-results-msg">No headlines match your search</p>
        </div>
        <div class="error-state hidden" id="error">
            <p class="error-code">503</p>
            <p class="error-msg">News feed unavailable</p>
            <code>python3 scraper/scraper.py</code>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <span class="footer-brand">THE BRIEF</span>
            <div class="footer-meta" aria-label="News timing information">
                <div class="footer-meta-row">
                    <span class="footer-meta-label">Time:</span>
                    <span class="footer-meta-value" id="footer-time">—</span>
                </div>
                <div class="footer-meta-row">
                    <span class="footer-meta-label">Time updated:</span>
                    <span class="footer-meta-value" id="footer-time-updated">—</span>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
